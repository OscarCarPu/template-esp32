[build]
target = "xtensa-esp32-none-elf"

[unstable]
build-std = ["core","alloc"]

[target.xtensa-esp32-none-elf]
runner = "espflash flash --monitor --chip esp32 --before default-reset --baud 115200"

[target.riscv32imc-unknown-none-elf]
runner = "espflash flash --monitor --chip esp32c3 -p /dev/ttyACM0"

[alias]
build-devkit = "build --target xtensa-esp32-none-elf --no-default-features --features esp32 --release"
build-supermini = "build --target riscv32imc-unknown-none-elf --no-default-features --features esp32c3 --release"

run-devkit = "run --target xtensa-esp32-none-elf --no-default-features --features esp32 --release"
run-supermini = "run --target riscv32imc-unknown-none-elf --no-default-features --features esp32c3 --release"
